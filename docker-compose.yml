services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      HOST: 0.0.0.0
      PORT: "3001"
      DATA_FILE: /data/app.db
      LEGACY_DATA_FILE: /data/db.json
      CORS_ORIGIN: "*"
      CORS_CREDENTIALS: "true"
      SESSION_TTL_DAYS: "7"
      COOKIE_SECURE: "false"
    volumes:
      - backend_data:/data
    expose:
      - "3001"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      HOST: 0.0.0.0
      PORT: "4173"
      BACKEND_INTERNAL_URL: http://backend:3001
      PUBLIC_API_BASE_URL: ""
    depends_on:
      - backend
    expose:
      - "4173"
    restart: unless-stopped

volumes:
  backend_data:
